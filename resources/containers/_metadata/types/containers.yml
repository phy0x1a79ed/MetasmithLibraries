ontology:
  doi: https://doi.org/10.1093/bioinformatics/btt113
  name: EDAM
  strict: false
  version: '1.25'
schema: v1
types:
  bbtools.oci:
    properties:
      Format: OCI
      provides:
      - bbtools/bbduk.sh
      - bbtools/filterbyname.sh
      - bbtools/reformat.sh
  bedtools.oci:
    properties:
      Format: OCI
      provides:
      - bedtools
      - bedtools/genomecov
  checkm.oci:
    properties:
      Format: OCI
      provides: checkm
  container:
    properties:
      Format: OCI
  diamond.oci:
    properties:
      Format: OCI
      provides:
      - diamond
      - diamond/blastp
      - diamond/linclust
      - diamond/makedb
  fastani.oci:
    properties:
      Format: OCI
      provides: fastani
  fastp.oci:
    properties:
      Format: OCI
      provides: fastp
  fastqc.oci:
    properties:
      Format: OCI
      provides: fastqc
  filtlong.oci:
    properties:
      Format: OCI
      provides: filtlong
  flye.oci:
    properties:
      Format: OCI
      provides: flye
  genomad.oci:
    properties:
      Format: OCI
      provides: genomad
  gfatools.oci:
    properties:
      Format: OCI
      provides: gfatools
  gtdbtk.oci:
    properties:
      Format: OCI
      provides: gtdbtk
  hifiasm-meta.oci:
    properties:
      Format: OCI
      provides: hifiasm-meta
  hifiasm.oci:
    properties:
      Format: OCI
      provides: hifiasm
  megahit.oci:
    properties:
      Format: OCI
      provides: megahit
  metabuli.oci:
    properties:
      Format: OCI
      provides: metabuli
  miniasm.oci:
    properties:
      Format: OCI
      provides: miniasm
  minimap2.oci:
    properties:
      Format: OCI
      provides: minimap2
  nanoplot.oci:
    properties:
      Format: OCI
      provides: nanoplot
  ncbi-datasets.oci:
    properties:
      Format: OCI
      provides: ncbi-datasets
  ppanggolin.oci:
    properties:
      Format: OCI
      provides: ppanggolin
  pprodigal.oci:
    properties:
      Format: OCI
      provides: pprodigal
  pulled_container:
    properties:
      atomic_description: pulled OCI container
      ext: log
  python_for_data_science.oci:
    properties:
      Format: OCI
      provides:
      - py/biopython
      - py/jupyter
      - py/matplotlib
      - py/notebook
      - py/numba
      - py/numpy
      - py/pandas
      - py/plotly
      - py/requests
      - py/scipy
      - py/xmltodict
      - py/yaml
      - python=3.12
  samtools.oci:
    properties:
      Format: OCI
      provides: samtools
  seqkit.oci:
    properties:
      Format: OCI
      provides:
      - seqkit
      - seqkit/stat
  sra-tools.oci:
    properties:
      Format: OCI
      provides:
      - fasterq-dump
      - sratk/prefetch
      - sratk/vdb-validate
