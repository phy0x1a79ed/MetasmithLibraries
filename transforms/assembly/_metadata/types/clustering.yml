ontology:
  doi: https://doi.org/10.1093/bioinformatics/btt113
  name: EDAM
  strict: false
  version: '1.25'
schema: v1
types:
  augmented_centroids:
    properties:
      Data: representative AA sequences augmented with new ORFs
      Format: FASTA
      ext: faa
  centroids:
    properties:
      Data: representative AA sequences from clustering
      Format: FASTA
      ext: faa
  cluster_table:
    properties:
      Data: diamond linclust cluster membership assignments
      Format: TSV
      ext: tsv
  min_identity:
    properties:
      Data: minimum percent identity threshold for clustering
      arity: 1
      ext: txt
  new_cluster_assignments:
    properties:
      Data: cluster assignments for newly added ORFs
      Format: TSV
      ext: tsv
