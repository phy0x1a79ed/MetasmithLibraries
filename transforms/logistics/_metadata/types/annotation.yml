ontology:
  doi: https://doi.org/10.1093/bioinformatics/btt113
  name: EDAM
  strict: false
  version: '1.25'
schema: v1
types:
  deepec_predictions:
    properties:
      _:
      - DeepEC EC number predictions
      ext: tsv
  diamond_uniref50_results:
    properties:
      Format: BLAST6
      _:
      - DIAMOND alignment to UniRef50
      ext: tsv
  interproscan_data:
    properties:
    - InterProScan data directory
  interproscan_json:
    properties:
      Format: JSON
      _:
      - InterProScan annotations in JSON format
      ext: json
  interproscan_results:
    properties:
      Format: CSV
      _:
      - Parsed InterProScan protein matches
      ext: csv
  interproscan_source:
    properties:
    - Marker for InterProScan data location
  kofamscan_ko_list:
    properties:
      _:
      - KofamScan KO list file
      ext: tsv
  kofamscan_profiles:
    properties:
    - KofamScan HMM profile directory containing .hmm files
  kofamscan_results:
    properties:
      Format: CSV
      _:
      - Filtered KofamScan KO assignments
      ext: csv
  kofamscan_source:
    properties:
    - Marker for KofamScan database download
  proteinbert_embeddings:
    properties:
      Format: Parquet
      _:
      - ProteinBERT embedding vectors
      ext: parquet
  proteinbert_index:
    properties:
      Format: CSV
      _:
      - ProteinBERT sequence index
      ext: csv
  uniref50_diamond_db:
    properties:
      _:
      - DIAMOND-formatted UniRef50 database
      ext: dmnd
  uniref50_source:
    properties:
    - Marker for UniRef50 database download
