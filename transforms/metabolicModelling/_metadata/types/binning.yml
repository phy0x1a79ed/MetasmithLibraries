ontology:
  doi: https://doi.org/10.1093/bioinformatics/btt113
  name: EDAM
  strict: false
  version: '1.25'
schema: v1
types:
  bin_fasta:
    properties:
      _: a single metagenomic bin FASTA file
      Data: DNA sequence
      Format: FASTA
      content: metagenomic bin
      ext: fa
  bin_directory:
    properties:
      _: directory containing binned contig FASTA files
      content: metagenomic bins
  contig_to_bin_table:
    properties:
      _: contig to bin assignment table
      ext: tsv
      content: bin assignments
  semibin_environment:
    properties:
      _: SemiBin habitat model name
      arity: 1
      ext: txt
