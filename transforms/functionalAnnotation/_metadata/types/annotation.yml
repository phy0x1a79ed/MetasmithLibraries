ontology:
  doi: https://doi.org/10.1093/bioinformatics/btt113
  name: EDAM
  strict: false
  version: '1.25'
schema: v1
types:
  deepec_predictions:
    properties:
      _:
      - DeepEC EC number predictions
      ext: tsv
  diamond_uniref50_results:
    properties:
      Format: BLAST6
      _:
      - DIAMOND alignment to UniRef50
      ext: tsv
  dram_db:
    properties:
    - DRAM database directory
  dramv_annotations:
    properties:
      _:
      - DRAM-v gene annotations for viral contigs
      ext: tsv
  dramv_distill:
    properties:
    - DRAM-v distilled AMG summary and visualizations
  eggnog_db:
    properties:
    - EggNOG-mapper diamond and HMM databases directory
  eggnog_data:
    properties:
    - eggNOG-mapper database directory
  eggnog_source:
    properties:
    - Marker for eggNOG database download
  eggnog_mapper_results:
    properties:
      Format: TSV
      _:
      - EggNOG-mapper functional annotations (KO, EC, COG, GO, pathways)
      ext: tsv
  eggnog_results:
    properties:
      Format: TSV
      _:
      - eggNOG-mapper functional annotations (GO, KEGG, Pfam, COG)
      ext: tsv
  busco_results:
    properties:
      Format: JSON
      _:
      - BUSCO completeness assessment summary
      ext: json
  busco_lineage:
    properties:
    - Pre-downloaded BUSCO lineage dataset directory
  busco_source:
    properties:
    - Marker for BUSCO lineage dataset specification
  interproscan_data:
    properties:
    - InterProScan data directory
  interproscan_gff:
    properties:
      Format: GFF3
      _:
      - InterProScan annotations in GFF3 format
      ext: gff3
  interproscan_json:
    properties:
      Format: JSON
      _:
      - InterProScan annotations in JSON format
      ext: json
  interproscan_source:
    properties:
    - Marker for InterProScan data location
  kofamscan_ko_list:
    properties:
      _:
      - KofamScan KO list file
      ext: tsv
  kofamscan_profiles:
    properties:
    - KofamScan HMM profile directory containing .hmm files
  kofamscan_results:
    properties:
      Format: TSV
      _:
      - KEGG KO assignments from KofamScan
      ext: txt
  kofamscan_source:
    properties:
    - Marker for KofamScan database download
  proteinbert_embeddings:
    properties:
      Format: Parquet
      _:
      - ProteinBERT embedding vectors
      ext: parquet
  proteinbert_index:
    properties:
      Format: CSV
      _:
      - ProteinBERT sequence index
      ext: csv
  uniref50_diamond_db:
    properties:
      _:
      - DIAMOND-formatted UniRef50 database
      ext: dmnd
  uniref50_source:
    properties:
    - Marker for UniRef50 database download
  virsorter2_affi_contigs:
    properties:
      _:
      - VirSorter2 gene affiliation table for DRAM-v
      ext: tab
  virsorter2_boundary:
    properties:
      _:
      - VirSorter2 viral boundary positions
      ext: tsv
  virsorter2_db:
    properties:
    - VirSorter2 reference database directory
  virsorter2_scores:
    properties:
      _:
      - VirSorter2 viral scores and metadata
      ext: tsv
  virsorter2_viral_sequences:
    properties:
      Format: FASTA
      _:
      - VirSorter2 identified viral sequences
      ext: fa
