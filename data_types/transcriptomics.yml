types:
  experiment:
    properties:
      logistics: to group samples into a transcriptomics experiment
  salmon_index:
    properties:
      _: salmon quasi-mapping index
  salmon_quant:
    properties:
      _: salmon quantification output
      ext: sf
  count_table:
    properties:
      _: normalized count table
      ext: tsv
  diff_count_table:
    properties:
      _: DESeq2-normalized count table for differential expression
      ext: tsv

  # --- Eukaryotic pipeline types ---
  star_index:
    properties:
      _: STAR genome index for splice-aware alignment
  star_bam:
    properties:
      _: STAR-aligned coordinate-sorted BAM
      ext: bam
  stringtie_gtf:
    properties:
      _: StringTie per-sample transcript assembly
      ext: gtf
  merged_gtf:
    properties:
      _: StringTie merged transcript annotation across all samples
      ext: gtf
  stringtie_quant_gtf:
    properties:
      _: StringTie quantified transcript GTF with expression estimates
      ext: gtf
  gene_count_table:
    properties:
      _: gene-level count matrix from StringTie
      ext: csv
  deseq2_results:
    properties:
      _: DESeq2 differential expression results for all pairwise comparisons
      ext: csv
  merged_bam:
    properties:
      _: merged BAM from all samples in an experiment
      ext: bam
  volcano_plot:
    properties:
      _: interactive volcano plot of pairwise differential expression
      ext: html
  volcano_plot_png:
    properties:
      _: static volcano plot image of pairwise differential expression
      ext: png
  braker3_gff:
    properties:
      _: Braker3 gene predictions in GFF3 format
      ext: gff3
  braker3_proteins:
    properties:
      _: Braker3 predicted protein sequences
      ext: faa
