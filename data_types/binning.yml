types:
  bin_fasta:
    properties:
      _: a single metagenomic bin FASTA file
      Format: FASTA
      Data: DNA sequence
      ext: fna
  contig_to_bin_table:
    properties:
      _: contig to bin assignment table
      ext: tsv

  metabat2_bin_fasta:
    extends:
    - bin_fasta
    properties:
      method: metabat2
  metabat2_contig_to_bin_table:
    extends:
    - contig_to_bin_table
    properties:
      method: metabat2

  semibin2_bin_fasta:
    extends:
    - bin_fasta
    properties:
      method: semibin2
  semibin2_contig_to_bin_table:
    extends:
    - contig_to_bin_table
    properties:
      method: semibin2

  comebin_bin_fasta:
    extends:
    - bin_fasta
    properties:
      method: comebin
  comebin_contig_to_bin_table:
    extends:
    - contig_to_bin_table
    properties:
      method: comebin