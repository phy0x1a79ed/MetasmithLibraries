types:
  # InterProScan
  interproscan_json:
    properties:
      _: InterProScan annotations in JSON format
      Format: JSON
      ext: json
  interproscan_gff:
    properties:
      _: InterProScan annotations in GFF3 format
      Format: GFF3
      ext: gff3

  # KofamScan
  kofamscan_results:
    properties:
      _: KEGG KO assignments from KofamScan
      Format: TSV
      ext: txt

  # ProteinBERT
  proteinbert_embeddings:
    properties:
      _: ProteinBERT embedding vectors
      Format: Parquet
      ext: parquet
  proteinbert_index:
    properties:
      _: ProteinBERT sequence index
      Format: CSV
      ext: csv

  # DeepEC
  deepec_predictions:
    properties:
      _: DeepEC EC number predictions
      ext: tsv

  # DIAMOND UniRef50
  diamond_uniref50_results:
    properties:
      _: DIAMOND alignment to UniRef50
      Format: BLAST6
      ext: tsv

  # Reference database types
  uniref50_diamond_db:
    properties:
      _: DIAMOND-formatted UniRef50 database
      ext: dmnd
  uniref50_source:
    properties:
      _: Marker for UniRef50 database download

  # KofamScan databases
  kofamscan_profiles:
    properties:
      _: KofamScan HMM profile directory containing .hmm files
  kofamscan_ko_list:
    properties:
      _: KofamScan KO list file
      ext: tsv
  kofamscan_source:
    properties:
      _: Marker for KofamScan database download

  # EggNOG-mapper
  eggnog_mapper_results:
    properties:
      _: EggNOG-mapper functional annotations (KO, EC, COG, GO, pathways)
      Format: TSV
      ext: tsv
  eggnog_db:
    properties:
      _: EggNOG-mapper diamond and HMM databases directory

  # InterProScan data
  interproscan_data:
    properties:
      _: InterProScan data directory
  interproscan_source:
    properties:
      _: Marker for InterProScan data location

  # VirSorter2
  virsorter2_viral_sequences:
    properties:
      _: VirSorter2 identified viral sequences
      Format: FASTA
      ext: fa
  virsorter2_scores:
    properties:
      _: VirSorter2 viral scores and metadata
      ext: tsv
  virsorter2_affi_contigs:
    properties:
      _: VirSorter2 gene affiliation table for DRAM-v
      ext: tab
  virsorter2_boundary:
    properties:
      _: VirSorter2 viral boundary positions
      ext: tsv
  virsorter2_db:
    properties:
      _: VirSorter2 reference database directory

  # DRAM-v
  dramv_annotations:
    properties:
      _: DRAM-v gene annotations for viral contigs
      ext: tsv
  dramv_distill:
    properties:
      _: DRAM-v distilled AMG summary and visualizations
  dram_db:
    properties:
      _: DRAM database directory
