types:
  # InterProScan
  interproscan_json:
    properties:
      _: InterProScan annotations in JSON format
      Format: JSON
      ext: json
  interproscan_gff:
    properties:
      _: InterProScan annotations in GFF3 format
      Format: GFF3
      ext: gff3

  # KofamScan
  kofamscan_results:
    properties:
      _: KEGG KO assignments from KofamScan
      Format: TSV
      ext: txt

  # ProteinBERT
  proteinbert_embeddings:
    properties:
      _: ProteinBERT embedding vectors
      Format: Parquet
      ext: parquet
  proteinbert_index:
    properties:
      _: ProteinBERT sequence index
      Format: CSV
      ext: csv

  # DeepEC
  deepec_predictions:
    properties:
      _: DeepEC EC number predictions
      ext: tsv

  # DIAMOND UniRef50
  diamond_uniref50_results:
    properties:
      _: DIAMOND alignment to UniRef50
      Format: BLAST6
      ext: tsv

  # Reference database types
  uniref50_diamond_db:
    properties:
      _: DIAMOND-formatted UniRef50 database
      ext: dmnd
  uniref50_source:
    properties:
      _: Marker for UniRef50 database download

  # KofamScan databases
  kofamscan_profiles:
    properties:
      _: KofamScan HMM profile directory containing .hmm files
  kofamscan_ko_list:
    properties:
      _: KofamScan KO list file
      ext: tsv
  kofamscan_source:
    properties:
      _: Marker for KofamScan database download

  # eggNOG-mapper
  eggnog_data:
    properties:
      _: eggNOG-mapper database directory
  eggnog_source:
    properties:
      _: Marker for eggNOG database download
  eggnog_results:
    properties:
      _: eggNOG-mapper functional annotations (GO, KEGG, Pfam, COG)
      Format: TSV
      ext: tsv

  # BUSCO
  busco_results:
    properties:
      _: BUSCO completeness assessment summary
      Format: JSON
      ext: json
  busco_lineage:
    properties:
      _: Pre-downloaded BUSCO lineage dataset directory
  busco_source:
    properties:
      _: Marker for BUSCO lineage dataset specification

  # InterProScan data
  interproscan_data:
    properties:
      _: InterProScan data directory
  interproscan_source:
    properties:
      _: Marker for InterProScan data location
